# nginx equivalent of gausify-server.
#
# Serves a Gausify splat library with the exact surface the binary provides:
#   - JSON directory listings in the `[{name,type,mtime,size}]` shape the
#     gallery crawls (nginx `autoindex_format json`);
#   - Range / partial-content support (built in for static files);
#   - permissive CORS so the hosted web app can fetch across origins;
#   - long-lived immutable caching for `.sog` / `.ply` / `.splat` frames;
#   - hidden dotfiles.
#
# Point `root` at your library folder (the one holding `3dgs/` and `4dgs/`),
# drop this file in `sites-available/` (or an `http {}` include), and reload.
#
# ---------------------------------------------------------------------------
# TLS: the web app is served over HTTPS, and an HTTPS page can only fetch
# HTTPS resources (mixed-content rule), so terminate TLS here. For a LAN box
# with no public domain, generate a self-signed cert once:
#
#   mkdir -p /etc/nginx/certs
#   openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
#     -keyout /etc/nginx/certs/gausify-key.pem \
#     -out    /etc/nginx/certs/gausify-cert.pem \
#     -subj "/CN=Gausify Local Server" \
#     -addext "subjectAltName=DNS:localhost,IP:127.0.0.1,IP:192.168.1.10"
#
# Replace 192.168.1.10 with this machine's LAN IP. As with the binary, the
# browser must visit the HTTPS URL once and accept the self-signed cert.
# ---------------------------------------------------------------------------

server {
    listen              8443 ssl;
    listen              [::]:8443 ssl;
    server_name         _;

    ssl_certificate     /etc/nginx/certs/gausify-cert.pem;
    ssl_certificate_key /etc/nginx/certs/gausify-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # >>> Change this to your library folder. <<<
    root /path/to/library;

    # No index file — always fall through to the JSON autoindex for directories.
    index "";

    location / {
        # JSON directory listing: [{ "name", "type", "mtime", "size" }, ...]
        autoindex        on;
        autoindex_format json;

        # CORS — mirror the binary: any origin, GET/HEAD/OPTIONS, Range in,
        # Content-Length/Content-Range/Accept-Ranges out.
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

        # Answer CORS preflight without hitting the filesystem.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Range" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # Splat frames never change once written — cache them hard, like the binary.
    location ~* \.(sog|ply|splat)$ {
        add_header Access-Control-Allow-Origin   "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Hide dotfiles (the binary skips them; notably its `.gausify` cert cache).
    location ~ /\. {
        deny all;
    }
}

# Optional plain-HTTP listener for same-scheme / local testing. Keep HTTPS as
# the URL you paste into the gallery when the app itself is served over HTTPS.
server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root /path/to/library;
    index "";

    location / {
        autoindex        on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
    }

    location ~* \.(sog|ply|splat)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~ /\. {
        deny all;
    }
}
